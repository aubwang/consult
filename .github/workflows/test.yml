name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: oven-sh/setup-bun@v2
      - name: Enable bubblewrap (Ubuntu 24.04 restricts unprivileged userns)
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat ripgrep
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Verify tracked symlinks resolve
        run: |
          git ls-files -s | awk '$1 == 120000 {print $4}' | while read -r link; do
            [ -e "$link" ] || { echo "broken symlink: $link"; exit 1; }
          done
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - name: Verify packed npm and Bun installs through confinement
        run: CONSULT_PACKAGE_SMOKE_CONFINED=1 bun run pack:check

  macos-confinement:
    strategy:
      matrix:
        runner: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Verify packed npm and Bun installs through Seatbelt confinement
        run: CONSULT_PACKAGE_SMOKE_CONFINED=1 bun run pack:check
