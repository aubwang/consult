name: release

on:
  push:
    branches: [main]

permissions:
  contents: write # release-please creates release commits, tags, and GitHub Releases
  pull-requests: write # release-please opens/updates the release PR
  id-token: write # npm provenance + trusted publishing (OIDC)

jobs:
  release-please:
    needs: macos-confinement
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  macos-confinement:
    strategy:
      matrix:
        runner: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Verify packed npm and Bun installs through Seatbelt confinement
        run: CONSULT_PACKAGE_SMOKE_CONFINED=1 bun run pack:check

  publish:
    needs: [release-please, macos-confinement]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@v2
      - name: Enable bubblewrap (Ubuntu 24.04 restricts unprivileged userns)
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap socat ripgrep
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - name: Verify packed npm and Bun installs through confinement
        run: CONSULT_PACKAGE_SMOKE_CONFINED=1 bun run pack:check
      - name: Publish with provenance
        run: |
          npm --version
          npm publish --provenance --access public
